// Quick Command Menu configuration
//
// Each numbered section requires:
//   "name"      Text displayed in the menu.
//
// Each section must also contain at least one of:
//   "command"   Command executed by the client when selected.
//   "chatprint" Message printed only to the client who selected it.
//
// Supported chat colors:
//   {default}, {darkred}, {green}, {lightgreen}, {red}, {blue}, {olive},
//   {lime}, {lightred}, {purple}, {grey}, {gray}, {yellow}, {orange},
//   {bluegrey}, {bluegray}, {lightblue}, {darkblue}, {grey2}, {gray2},
//   {orchid}, {lightred2}

"quickcommand"
{
	"1"
	{
		"name"		"!rules"
		"command"	"sm_rules"
	}

	"2"
	{
		"name"		"!discord"
		"chatprint"	"{grey}「{purple}MoonGlow{grey}」 {purple}https://discord.com/invite/Y9t9tA3"
	}
}
